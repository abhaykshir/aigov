name: aigov CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Run aigov against the repo itself and upload the report
  # --------------------------------------------------------------------------
  governance-scan:
    name: AI Governance Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install aigov
        run: uv pip install --system -e ".[aws]"

      - name: Run aigov scan
        run: |
          aigov scan . \
            --classify \
            --output json \
            --out-file aigov-results.json

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aigov-results
          path: aigov-results.json
          if-no-files-found: warn

      - name: Generate SARIF report
        run: |
          aigov scan . \
            --classify \
            --output sarif \
            --out-file aigov.sarif

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: aigov.sarif

  # --------------------------------------------------------------------------
  # Job 2: Run the full test suite
  # --------------------------------------------------------------------------
  test:
    name: Test Suite (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install aigov + test dependencies
        run: uv pip install --system -e ".[aws]" pytest

      - name: Run tests
        run: pytest -q
