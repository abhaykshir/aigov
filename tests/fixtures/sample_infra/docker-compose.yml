version: "3.9"

services:
  inference:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  vllm:
    image: vllm/vllm-openai:latest
    ports:
      - "8000:8000"
    command: ["--model", "meta-llama/Llama-2-7b-hf", "--gpu-memory-utilization", "0.9"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aigov
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: governance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
